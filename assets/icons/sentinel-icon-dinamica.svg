<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow-dynamic">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Párpado superior (curva) -->
  <path d="M 60 85 Q 100 60 140 85" fill="none" stroke="#0F0F0F" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Párpado inferior (curva) -->
  <path d="M 60 115 Q 100 140 140 115" fill="none" stroke="#0F0F0F" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Iris (círculo rojo) -->
  <circle cx="100" cy="100" r="32" fill="#EF4444" filter="url(#glow-dynamic)"/>
  
  <!-- Pupila (negro) -->
  <circle cx="100" cy="100" r="20" fill="#0F0F0F"/>
  
  <!-- Brillo 1 (grande, blanco) -->
  <circle cx="92" cy="92" r="8" fill="#FFFFFF" opacity="0.95"/>
  
  <!-- Brillo 2 (pequeño, blanco) -->
  <circle cx="108" cy="108" r="3" fill="#FFFFFF" opacity="0.7"/>
  
  <!-- Línea de energía/escaneo ondulante -->
  <path d="M 50 100 Q 75 75 100 100 Q 125 125 150 100" fill="none" stroke="#FF9900" stroke-width="2" opacity="0.7" stroke-dasharray="5,3"/>
  
  <!-- Puntos de energía -->
  <circle cx="50" cy="100" r="2" fill="#FF9900" opacity="0.6"/>
  <circle cx="150" cy="100" r="2" fill="#FF9900" opacity="0.6"/>
</svg>
